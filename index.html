<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>NERO DEWAR</title>

<style>
:root{
  --bg:#0B0F18;
  --surface:#111826;
  --text:text:#0b1a2b;
  --muted:#6b7c93;

  --accent:#00A7FF;
  --accentHi:#5ED6FF;
  --border:#9EDCFF;

  --shadow:0 12px 30px rgba(0,80,140,.10);
  --glow:0 0 24px rgba(0,167,255,.30);
}

*{box-sizing:border-box}
body{
  margin:0;
  background:
    radial-gradient(900px 520px at 50% -10%, rgba(0,167,255,.10), transparent 60%),
    radial-gradient(700px 420px at 20% 0%, rgba(94,214,255,.10), transparent 60%),
    linear-gradient(#ffffff, #ffffff);
  color:var(--text);
  font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
}

body::before{
  content:"";
  position:fixed; inset:0;
  pointer-events:none;
  opacity:.20;
  background:
    radial-gradient(circle at 12% 18%, rgba(0,0,0,.03) 0 1px, transparent 2px),
    radial-gradient(circle at 62% 72%, rgba(0,0,0,.025) 0 1px, transparent 2px),
    radial-gradient(circle at 82% 28%, rgba(0,0,0,.02) 0 1px, transparent 2px),
    radial-gradient(circle at 32% 86%, rgba(0,0,0,.02) 0 1px, transparent 2px);
  background-size: 160px 160px, 220px 220px, 180px 180px, 260px 260px;
  mix-blend-mode:multiply;
}

/* Header */
header{
  position:sticky;
  top:0;
  z-index:30;
  background:rgba(255,255,255,.88);
  backdrop-filter:blur(12px);
  border-bottom:2px solid rgba(158,220,255,.85);
}
.wrap{max-width:1180px;margin:0 auto;padding:22px}

.logo{
  font-weight:1000;
  font-size:clamp(40px,6vw,78px);
  color:var(--accent);
  text-transform:uppercase;
  letter-spacing:1px;
  text-shadow:
    2px 0 rgba(0,120,255,.20),
   -2px 0 rgba(94,214,255,.25),
    0 0 24px rgba(0,167,255,.28);
}

.logo-btn{cursor:pointer}
.about-btn{
  cursor:pointer;
  font-weight:900;
  color:var(--accent);
}

/* Scenes */
.scene{display:none}
.scene.active{display:block}

/* ===== ABOUT PAGE ===== */
.about-page{
  display:flex;
  align-items:center;
  justify-content:center;
  gap:40px;
  min-height:60vh;
}

.about-photo{
  width:260px;
  height:260px;
  border-radius:22px;
  object-fit:cover;
  border:2px solid rgba(158,220,255,.90);
  box-shadow:0 0 28px rgba(0,167,255,.20);
  background:#eaeaea;
}

.about-content{
  max-width:520px;
}

.about-content h2{
  margin:0 0 10px;
  font-size:28px;
  font-weight:1000;
}

.about-content p{
  margin:0;
  font-size:16px;
  line-height:1.6;
}

@media (max-width:820px){
  .about-page{flex-direction:column;text-align:center;}
}
</style>
</head>

<body>

<header>
  <div class="wrap" style="display:flex;align-items:flex-end;gap:20px">
    <div id="titleHomeBtn" class="logo logo-btn">NERO DEWAR</div>
    <div id="aboutBtn" class="about-btn">About</div>
  </div>
</header>

<main class="wrap">

  <!-- CATALOGUE -->
  <section id="catalogueScene" class="scene active">
    <div id="albumGrid"></div>
  </section>

  <!-- ALBUM -->
  <section id="albumScene" class="scene"></section>

  <!-- ABOUT -->
  <section id="aboutScene" class="scene">
    <div class="about-page">
      <img class="about-photo" src="https://pub-fcb7451138fa4bf39b6e0d6f01a687a6.r2.dev/IMG_3898.jpeg" alt="Nero Dewar">
      <div class="about-content">
        <h2>About Me</h2>
        <p>Contact <strong>nerodewar@gmail.com</strong> for more information.</p>
      </div>
    </div>
  </section>

</main>

<script>
const catalogueScene = document.getElementById("catalogueScene");
const albumScene = document.getElementById("albumScene");
const aboutScene = document.getElementById("aboutScene");

const titleHomeBtn = document.getElementById("titleHomeBtn");
const aboutBtn = document.getElementById("aboutBtn");

function show(scene){
  catalogueScene.classList.remove("active");
  albumScene.classList.remove("active");
  aboutScene.classList.remove("active");
  scene.classList.add("active");
}

function goHome(){
  show(catalogueScene);
  history.replaceState(null,"","#");
}

titleHomeBtn.onclick = goHome;

aboutBtn.onclick = () => {
  show(aboutScene);
  history.replaceState(null,"","#about");
};

window.addEventListener("hashchange", () => {
  const hash = location.hash;

  if(hash === "#about"){
    show(aboutScene);
    return;
  }

  goHome();
});
</script>

</body>
</html>
