<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>NERO DEWAR</title>

<style>
/* === KEEP ALL YOUR ORIGINAL CSS === */

/* ADD THIS AT THE VERY END OF YOUR STYLE */

/* ===== ABOUT PAGE ===== */
.about-page{
  display:flex;
  align-items:center;
  justify-content:center;
  gap:40px;
  min-height:60vh;
  padding:20px 0;
}

.about-photo{
  width:260px;
  height:260px;
  border-radius:22px;
  object-fit:cover;
  border:2px solid rgba(158,220,255,.90);
  box-shadow:0 0 28px rgba(0,167,255,.20);
  background:#eaeaea;
}

.about-content{
  max-width:520px;
}

.about-content h2{
  margin:0 0 10px;
  font-size:28px;
  font-weight:1000;
}

.about-content p{
  margin:0;
  font-size:16px;
  line-height:1.6;
}

@media (max-width:820px){
  .about-page{
    flex-direction:column;
    text-align:center;
  }
}
</style>
</head>

<body>

<header>
  <div class="wrap" style="display:flex;align-items:flex-end;gap:20px">
    <div id="titleHomeBtn" class="logo logo-btn" title="Home">NERO DEWAR</div>

    <!-- ADD THIS BUTTON -->
    <div id="aboutBtn" style="cursor:pointer;font-weight:900;color:var(--accent);">
      About
    </div>
  </div>
</header>

<main class="wrap">

  <!-- KEEP YOUR ORIGINAL CATALOGUE SCENE EXACTLY AS IS -->

  <!-- ADD THIS NEW SCENE UNDER albumScene -->
  <section id="aboutScene" class="scene">
    <div class="about-page">

      <!-- IMAGE PLACEHOLDER -->
      <img class="about-photo" src="..." alt="Nero Dewar">

      <!-- TEXT -->
      <div class="about-content">
        <h2>About Me</h2>
        <p>
          Contact <strong>nerodewar@gmail.com</strong> for more information.
        </p>
      </div>

    </div>
  </section>

</main>

<script>
/* KEEP ALL YOUR ORIGINAL JS */

/* === ADD THESE LINES === */

const aboutScene = document.getElementById("aboutScene");
const aboutBtn = document.getElementById("aboutBtn");

/* MODIFY show() FUNCTION */
const originalShow = show;
show = function(scene){
  catalogueScene.classList.remove("active");
  albumScene.classList.remove("active");
  aboutScene.classList.remove("active");
  scene.classList.add("active");
};

/* ABOUT BUTTON */
aboutBtn.addEventListener("click", () => {
  show(aboutScene);
  history.replaceState(null, "", "#about");
});

/* EXTEND HASH ROUTING */
window.addEventListener("hashchange", () => {
  const hash = location.hash;

  if (hash === "#about"){
    show(aboutScene);
    return;
  }

  const p = parseHash();
  const rel = p.get("release");
  const trk = p.get("track");

  if (!rel){
    goHome();
    return;
  }

  openAlbum(rel);

  if (trk){
    const i = queue.findIndex(t => t.id === trk);
    if (i >= 0) playFromQueue(i);
  }
});
</script>

</body>
</html>
